name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static syntax check
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --run

      - name: Run staging preflight contract
        run: npm run staging:preflight:ci

      - name: Run PR release gates
        if: github.event_name == 'pull_request'
        run: npm run release:check

      - name: Run main release gates
        if: github.event_name == 'push'
        run: npm run release:check:main

      - name: Build
        run: npm run build
