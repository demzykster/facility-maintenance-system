name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static syntax check
        run: npm run lint

      - name: Run project harness check
        run: npm run project:harness:check

      - name: Run unit tests
        run: npm test -- --run

      - name: Run staging preflight contract
        run: npm run staging:preflight:ci

      - name: Run PR release gates
        if: github.event_name == 'pull_request'
        run: npm run release:check

      - name: Run main release gates
        if: github.event_name == 'push'
        run: npm run release:check:main

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run demo UI smoke
        run: |
          npm run preview -- --port 4173 > /tmp/cmms-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill "$PREVIEW_PID" 2>/dev/null || true' EXIT
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:4173/ >/dev/null || { cat /tmp/cmms-preview.log; exit 1; }
          CMMS_DEMO_UI_SMOKE_URL=http://127.0.0.1:4173/ npm run smoke:demo-ui
